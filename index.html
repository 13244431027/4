<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>资源库</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; max-width: 1200px; margin: 0 auto; padding: 20px; background: #f5f5f5; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
        .tabs button { padding: 10px 30px; border: 1px solid #ddd; background: #fff; cursor: pointer; border-radius: 4px; font-size: 1em; }
        .tabs button.active { background: #333; color: #fff; border-color: #333; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; flex-wrap: wrap; }
        .controls input, .controls select, .controls button { padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        .controls input { width: 60%; max-width: 400px; }
        .controls button { cursor: pointer; background: #fff; transition: 0.2s; }
        .controls button.active { background: #0066cc; color: #fff; border-color: #0066cc; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .card img { width: 100%; height: 160px; object-fit: cover; border-radius: 4px; background: #eee; }
        .card h3 { margin: 10px 0 5px; font-size: 1.1em; }
        .card p { font-size: 0.9em; color: #666; flex-grow: 1; }
        .tags span { background: #e0f0ff; color: #0066cc; padding: 2px 6px; border-radius: 4px; font-size: 0.8em; margin-right: 5px; }
        .authors { margin: 10px 0; font-size: 0.85em; }
        .authors a { color: #555; text-decoration: none; margin-right: 8px; }
        .links { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
        .links a { flex: 1; min-width: 60px; text-align: center; padding: 5px; background: #333; color: #fff; text-decoration: none; border-radius: 4px; font-size: 0.8em; }
        .album-card { cursor: pointer; transition: transform 0.2s; }
        .album-card:hover { transform: translateY(-3px); box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        .album-count { font-size: 0.8em; color: #999; margin-top: 5px; }
        .pagination { display: flex; justify-content: center; gap: 10px; margin-top: 30px; }
        .pagination button { padding: 8px 16px; border: 1px solid #ddd; background: #fff; cursor: pointer; border-radius: 4px; }
        .pagination button.active { background: #333; color: #fff; border-color: #333; }
        .pagination button:disabled { opacity: 0.5; cursor: not-allowed; }
        .breadcrumb { margin-bottom: 15px; }
        .breadcrumb a { color: #0066cc; text-decoration: none; cursor: pointer; }
        .breadcrumb span { color: #999; margin: 0 5px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <!-- 主标签页 -->
    <div class="tabs">
        <button id="tabAll" class="active" onclick="switchTab('all')">全部资源</button>
        <button id="tabAlbum" onclick="switchTab('album')">专辑</button>
    </div>

    <!-- 全部资源视图 -->
    <div id="viewAll">
        <div class="controls">
            <input type="text" id="searchInput" placeholder="搜索名称、介绍、标签、作者..." oninput="handleSearch()">
            <select id="sortSelect" onchange="handleSort()">
                <option value="newest">最新上传</option>
                <option value="oldest">最旧上传</option>
            </select>
            <button id="exploreBtn" onclick="toggleExplore()">🔍 探索模式</button>
        </div>
        <div id="app" class="grid"></div>
        <div id="pagination" class="pagination"></div>
    </div>

    <!-- 专辑列表视图 -->
    <div id="viewAlbumList" class="hidden">
        <div class="controls">
            <input type="text" id="albumSearchInput" placeholder="搜索专辑名称、介绍..." oninput="handleAlbumSearch()">
        </div>
        <div id="albumGrid" class="grid"></div>
        <div id="albumPagination" class="pagination"></div>
    </div>

    <!-- 专辑详情视图 -->
    <div id="viewAlbumDetail" class="hidden">
        <div class="breadcrumb">
            <a onclick="switchTab('album')">专辑</a> <span>></span> <span id="albumDetailTitle"></span>
        </div>
        <div id="albumDetailHeader" style="background:#fff;padding:20px;border-radius:8px;margin-bottom:20px;box-shadow:0 2px 5px rgba(0,0,0,0.1);"></div>
        <div id="albumDetailGrid" class="grid"></div>
        <div id="albumDetailPagination" class="pagination"></div>
    </div>

    <script>
        const ITEMS_PER_PAGE = 20;
        let allData = [];
        let albums = [];
        let displayData = [];
        let displayAlbums = [];
        let currentPage = 1;
        let currentSort = 'newest';
        let isExploreMode = false;
        let currentTab = 'all';
        let currentAlbumDetail = null;
        let albumDetailData = [];
        let albumDetailPage = 1;

        async function init() {
            try {
                const [resData, resAlbums] = await Promise.all([
                    fetch('信息.json'),
                    fetch('专辑.json')
                ]);
                allData = await resData.json();
                albums = await resAlbums.json();
                displayData = [...allData];
                displayAlbums = [...albums];
                applyFiltersAndSort();
                renderAlbumList();
            } catch (e) {
                document.getElementById('app').innerHTML = '<p>加载失败，请检查 JSON 文件</p>';
                console.error(e);
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tabAll').classList.toggle('active', tab === 'all');
            document.getElementById('tabAlbum').classList.toggle('active', tab === 'album');
            document.getElementById('viewAll').classList.toggle('hidden', tab !== 'all');
            document.getElementById('viewAlbumList').classList.toggle('hidden', tab !== 'album');
            document.getElementById('viewAlbumDetail').classList.add('hidden');
            currentAlbumDetail = null;
        }

        // ========== 全部资源逻辑 ==========
        function handleSearch() {
            currentPage = 1;
            applyFiltersAndSort();
        }

        function handleSort() {
            if (isExploreMode) return;
            currentSort = document.getElementById('sortSelect').value;
            currentPage = 1;
            applyFiltersAndSort();
        }

        function toggleExplore() {
            isExploreMode = !isExploreMode;
            const btn = document.getElementById('exploreBtn');
            const sortSelect = document.getElementById('sortSelect');
            if (isExploreMode) {
                btn.classList.add('active');
                btn.innerText = '✅ 探索中';
                sortSelect.disabled = true;
            } else {
                btn.classList.remove('active');
                btn.innerText = '🔍 探索模式';
                sortSelect.disabled = false;
            }
            currentPage = 1;
            applyFiltersAndSort();
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function applyFiltersAndSort() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            displayData = allData.filter(item => 
                item.name.toLowerCase().includes(query) ||
                item.desc.toLowerCase().includes(query) ||
                item.tags.some(t => t.toLowerCase().includes(query)) ||
                item.authors.some(a => a.name.toLowerCase().includes(query))
            );
            if (isExploreMode) {
                shuffle(displayData);
            } else {
                displayData.sort((a, b) => {
                    const timeA = new Date(a.uploadTime).getTime();
                    const timeB = new Date(b.uploadTime).getTime();
                    return currentSort === 'newest' ? timeB - timeA : timeA - timeB;
                });
            }
            renderPage(1);
        }

        function renderPage(page) {
            currentPage = page;
            const start = (page - 1) * ITEMS_PER_PAGE;
            const data = displayData.slice(start, start + ITEMS_PER_PAGE);
            const total = Math.ceil(displayData.length / ITEMS_PER_PAGE);
            const container = document.getElementById('app');
            if (data.length === 0) {
                container.innerHTML = '<p style="grid-column: 1/-1; text-align: center;">无匹配结果</p>';
                document.getElementById('pagination').innerHTML = '';
                return;
            }
            container.innerHTML = data.map(item => renderItemCard(item)).join('');
            renderPagination('pagination', total);
        }

        function renderItemCard(item) {
            const imgSrc = item.image ? `封面/${item.image}` : `封面/${item.id}.png`;
            const links = [];
            if(item.fileUrl) links.push(`<a href="${item.fileUrl}" target="_blank">文件</a>`);
            if(item.docUrl) links.push(`<a href="${item.docUrl}" target="_blank">文档1</a>`);
            if(item.docUrl2) links.push(`<a href="${item.docUrl2}" target="_blank">文档2</a>`);
            if(item.exampleUrl) links.push(`<a href="${item.exampleUrl}" target="_blank">示例</a>`);
            return `
            <div class="card">
                <img src="${imgSrc}" alt="${item.name}" onerror="this.style.display='none'">
                <h3>${item.name}</h3>
                <p>${item.desc}</p>
                <div class="tags">${item.tags.map(t => `<span>#${t}</span>`).join('')}</div>
                <div class="authors">作者：${item.authors.map(a => `<a href="${a.url}" target="_blank">${a.name}</a>`).join(' ')}</div>
                <div class="links">${links.join('')}</div>
                <div style="font-size:0.7em;color:#999;margin-top:5px;">${item.uploadTime}</div>
            </div>`;
        }

        // ========== 专辑列表逻辑 ==========
        function handleAlbumSearch() {
            const query = document.getElementById('albumSearchInput').value.toLowerCase().trim();
            displayAlbums = albums.filter(album => 
                album.name.toLowerCase().includes(query) ||
                album.desc.toLowerCase().includes(query)
            );
            renderAlbumList();
        }

        function renderAlbumList() {
            const container = document.getElementById('albumGrid');
            const total = Math.ceil(displayAlbums.length / ITEMS_PER_PAGE);
            const start = (currentPage - 1) * ITEMS_PER_PAGE;
            const data = displayAlbums.slice(start, start + ITEMS_PER_PAGE);
            if (data.length === 0) {
                container.innerHTML = '<p style="grid-column: 1/-1; text-align: center;">无匹配专辑</p>';
                document.getElementById('albumPagination').innerHTML = '';
                return;
            }
            container.innerHTML = data.map(album => {
                const coverSrc = album.cover ? `封面/${album.cover}` : '';
                return `
                <div class="card album-card" onclick="openAlbumDetail('${album.albumId}')">
                    <img src="${coverSrc}" alt="${album.name}" onerror="this.style.background='#dee'">
                    <h3>${album.name}</h3>
                    <p>${album.desc}</p>
                    <div class="album-count">包含 ${album.itemIds.length} 个资源</div>
                </div>`;
            }).join('');
            renderPagination('albumPagination', total);
        }

        // ========== 专辑详情逻辑 ==========
        function openAlbumDetail(albumId) {
            const album = albums.find(a => a.albumId === albumId);
            if (!album) return;
            currentAlbumDetail = album;
            document.getElementById('viewAlbumList').classList.add('hidden');
            document.getElementById('viewAlbumDetail').classList.remove('hidden');
            document.getElementById('albumDetailTitle').innerText = album.name;
            document.getElementById('albumDetailHeader').innerHTML = `
                <h2 style="margin:0 0 10px;">${album.name}</h2>
                <p style="color:#666;margin:0;">${album.desc}</p>
                <div style="margin-top:10px;color:#999;font-size:0.9em;">包含 ${album.itemIds.length} 个资源</div>
            `;
            albumDetailPage = 1;
            renderAlbumDetail();
        }

        function renderAlbumDetail() {
            const itemIds = currentAlbumDetail.itemIds;
            albumDetailData = allData.filter(item => itemIds.includes(item.id));
            const container = document.getElementById('albumDetailGrid');
            const total = Math.ceil(albumDetailData.length / ITEMS_PER_PAGE);
            const start = (albumDetailPage - 1) * ITEMS_PER_PAGE;
            const data = albumDetailData.slice(start, start + ITEMS_PER_PAGE);
            if (data.length === 0) {
                container.innerHTML = '<p style="grid-column: 1/-1; text-align: center;">该专辑暂无资源</p>';
                document.getElementById('albumDetailPagination').innerHTML = '';
                return;
            }
            container.innerHTML = data.map(item => renderItemCard(item)).join('');
            renderPagination('albumDetailPagination', total);
        }

        // ========== 通用分页 ==========
        function renderPagination(containerId, total) {
            const container = document.getElementById(containerId);
            if (total <= 1) { container.innerHTML = ''; return; }
            let pageVar, pageFunc, currentPageVal;
            if (containerId === 'albumDetailPagination') {
                pageVar = 'albumDetailPage';
                pageFunc = 'renderAlbumDetail()';
                currentPageVal = albumDetailPage;
            } else if (containerId === 'albumPagination') {
                pageVar = 'currentPage';
                pageFunc = 'renderAlbumList()';
                currentPageVal = currentPage;
            } else {
                pageVar = 'currentPage';
                pageFunc = 'renderPage(currentPage)';
                currentPageVal = currentPage;
            }
            let html = `<button onclick="${pageVar}=${currentPageVal-1};${pageFunc}" ${currentPageVal === 1 ? 'disabled' : ''}>上一页</button>`;
            for (let i = 1; i <= total; i++) {
                if (i === 1 || i === total || (i >= currentPageVal - 1 && i <= currentPageVal + 1)) {
                    html += `<button onclick="${pageVar}=${i};${pageFunc}" class="${i === currentPageVal ? 'active' : ''}">${i}</button>`;
                } else if (i === currentPageVal - 2 || i === currentPageVal + 2) {
                    html += `<span>...</span>`;
                }
            }
            html += `<button onclick="${pageVar}=${currentPageVal+1};${pageFunc}" ${currentPageVal === total ? 'disabled' : ''}>下一页</button>`;
            container.innerHTML = html;
        }

        init();
    </script>
</body>
</html>
