<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>资源平台</title>
    <style>
        body { font-family: sans-serif; max-width: 1200px; margin: 0 auto; padding: 20px; background: #f5f5f5; }
        .nav { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
        .nav button { padding: 10px 20px; border: none; background: #ddd; cursor: pointer; border-radius: 4px; font-size: 1em; }
        .nav button.active { background: #0066cc; color: #fff; }
        .view { display: none; }
        .view.active { display: block; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; flex-wrap: wrap; }
        .controls input, .controls select { padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; flex-direction: column; position: relative; }
        .card img { width: 100%; height: 160px; object-fit: cover; border-radius: 4px; background: #eee; }
        .card h3 { margin: 10px 0 5px; }
        .card p { font-size: 0.9em; color: #666; flex-grow: 1; }
        .tags span { background: #e0f0ff; color: #0066cc; padding: 2px 6px; border-radius: 4px; font-size: 0.8em; margin-right: 5px; }
        .links { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
        .links a { flex: 1; text-align: center; padding: 5px; background: #333; color: #fff; text-decoration: none; border-radius: 4px; font-size: 0.8em; }
        .pagination { display: flex; justify-content: center; gap: 10px; margin-top: 30px; }
        .pagination button { padding: 8px 16px; border: 1px solid #ddd; background: #fff; cursor: pointer; border-radius: 4px; }
        .pagination button.active { background: #333; color: #fff; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 12px; background: #28a745; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 1em; }
        .btn-submit:disabled { background: #ccc; }
        .status { padding: 10px; margin-top: 15px; border-radius: 4px; text-align: center; }
        .status.success { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }
        .hidden { display: none; }
        .badge { position: absolute; top: 10px; right: 10px; padding: 3px 8px; border-radius: 4px; font-size: 0.7em; color: #fff; }
        .badge.official { background: #0066cc; }
        .badge.community { background: #28a745; }
    </style>
</head>
<body>
    <div class="nav">
        <button onclick="switchView('official')" id="btn-official" class="active">📌 官方资源</button>
        <button onclick="switchView('community')" id="btn-community">🌟 用户贡献</button>
        <button onclick="switchView('upload')" id="btn-upload">📤 提交扩展</button>
    </div>

    <!-- 官方视图 -->
    <div id="view-official" class="view active">
        <div class="controls">
            <input type="text" id="searchInput" placeholder="搜索..." oninput="handleSearch()">
            <select id="sortSelect" onchange="handleSort()"><option value="newest">最新</option><option value="oldest">最旧</option></select>
            <button onclick="toggleExplore()">🔍 探索</button>
        </div>
        <div id="officialApp" class="grid"></div>
        <div id="officialPagination" class="pagination"></div>
    </div>

    <!-- 社区视图 -->
    <div id="view-community" class="view">
        <div class="controls">
            <input type="text" id="searchInput2" placeholder="搜索..." oninput="handleSearch()">
            <select id="sortSelect2" onchange="handleSort()"><option value="newest">最新</option><option value="oldest">最旧</option></select>
        </div>
        <div id="communityApp" class="grid"></div>
        <div id="communityPagination" class="pagination"></div>
    </div>

    <!-- 上传视图 -->
    <div id="view-upload" class="view">
        <div style="max-width: 600px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 8px;">
            <h2 style="text-align: center;">提交扩展至仓库</h2>
            <div class="form-group">
                <label>GitHub Token (需 repo 权限) *</label>
                <input type="password" id="token" placeholder="ghp_..." onchange="verifyToken()">
                <small>仅本地使用，用于创建 PR</small>
            </div>
            <div class="form-group">
                <label>创作者</label>
                <input type="text" id="creator" readonly>
            </div>
            <div class="form-group">
                <label>扩展 ID (唯一) *</label>
                <input type="text" id="extId" placeholder="如：2001" onchange="checkId()">
            </div>
            <div class="form-group">
                <label>名称 *</label>
                <input type="text" id="extName">
            </div>
            <div class="form-group">
                <label>介绍 *</label>
                <textarea id="extDesc"></textarea>
            </div>
            <div class="form-group">
                <label>封面 URL *</label>
                <input type="url" id="extImage" placeholder="https://...">
            </div>
            <div class="form-group">
                <label>文件 URL *</label>
                <input type="url" id="extFile">
            </div>
            <div class="form-group">
                <label>文档 1 | 文档 2 | 示例</label>
                <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px;">
                    <input type="url" id="extDoc1" placeholder="Doc1">
                    <input type="url" id="extDoc2" placeholder="Doc2">
                    <input type="url" id="extExample" placeholder="Demo">
                </div>
            </div>
            <div class="form-group">
                <label>标签 (逗号分隔) *</label>
                <input type="text" id="extTags" placeholder="工具，效率">
            </div>
            <button class="btn-submit" id="submitBtn" onclick="submitPR()">创建 Pull Request</button>
            <div id="uploadStatus" class="status hidden"></div>
        </div>
    </div>

    <script>
        // ================= 配置区 (部署前修改) =================
        const REPO_OWNER = 'your-github-username'; // 仓库所有者
        const REPO_NAME = 'your-repo-name';        // 仓库名
        const BASE_BRANCH = 'main';                // 主分支名
        // =====================================================

        const ITEMS_PER_PAGE = 20;
        let officialData = [], communityData = [], existingIds = [];
        let displayOfficial = [], displayCommunity = [];
        let offPage = 1, comPage = 1, currentSort = 'newest', isExplore = false;
        let currentView = 'official';

        async function init() {
            try {
                const [r1, r2] = await Promise.all([fetch('信息.json'), fetch('其他用户上传.json')]);
                officialData = await r1.json();
                communityData = await r2.json();
                existingIds = [...officialData, ...communityData].map(i => i.id);
                renderList('official');
                renderList('community');
            } catch (e) { console.error('加载失败', e); }
        }

        function switchView(view) {
            currentView = view;
            document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav button').forEach(el => el.classList.remove('active'));
            document.getElementById(`view-${view}`).classList.add('active');
            document.getElementById(`btn-${view}`).classList.add('active');
        }

        function handleSearch() {
            const q = (currentView === 'official' ? document.getElementById('searchInput') : document.getElementById('searchInput2')).value.toLowerCase();
            const target = currentView === 'official' ? officialData : communityData;
            const display = currentView === 'official' ? displayOfficial : displayCommunity;
            
            const filtered = target.filter(i => i.name.toLowerCase().includes(q) || i.desc.toLowerCase().includes(q) || i.tags.some(t=>t.toLowerCase().includes(q)));
            if (currentView === 'official') displayOfficial = isExplore ? shuffle(filtered) : sort(filtered);
            else displayCommunity = sort(filtered);
            
            currentView === 'official' ? offPage = 1 : comPage = 1;
            renderList(currentView);
        }

        function handleSort() {
            currentSort = (currentView === 'official' ? document.getElementById('sortSelect') : document.getElementById('sortSelect2')).value;
            isExplore = false;
            handleSearch();
        }

        function toggleExplore() {
            if (currentView !== 'official') return;
            isExplore = !isExplore;
            handleSearch();
        }

        function sort(data) {
            return [...data].sort((a, b) => currentSort === 'newest' ? new Date(b.uploadTime) - new Date(a.uploadTime) : new Date(a.uploadTime) - new Date(b.uploadTime));
        }
        function shuffle(a) { const arr = [...a]; for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; }

        function renderList(type) {
            const data = type === 'official' ? displayOfficial : displayCommunity;
            const page = type === 'official' ? offPage : comPage;
            const total = Math.ceil(data.length / ITEMS_PER_PAGE);
            const container = document.getElementById(`${type}App`);
            const slice = data.slice((page - 1) * ITEMS_PER_PAGE, page * ITEMS_PER_PAGE);

            container.innerHTML = slice.length ? slice.map(i => `
                <div class="card">
                    <span class="badge ${type}">${type==='official'?'官方':'社区'}</span>
                    <img src="${i.image?.startsWith('http')?i.image:`封面/${i.image}`}" onerror="this.style.display='none'">
                    <h3>${i.name}</h3><p>${i.desc}</p>
                    <div class="tags">${i.tags.map(t=>`<span>#${t}</span>`).join('')}</div>
                    <div class="links">
                        ${i.fileUrl?<a href="${i.fileUrl}" target="_blank">文件</a>':''}
                        ${i.docUrl?<a href="${i.docUrl}" target="_blank">文档 1</a>':''}
                        ${i.docUrl2?<a href="${i.docUrl2}" target="_blank">文档 2</a>':''}
                        ${i.exampleUrl?<a href="${i.exampleUrl}" target="_blank">示例</a>':''}
                    </div>
                </div>`).join('') : '<p>无数据</p>';
            
            // 分页渲染略 (同前逻辑，为简洁省略部分代码，实际使用请补充完整分页逻辑)
            const pagContainer = document.getElementById(`${type}Pagination`);
            if(total > 1) {
                pagContainer.innerHTML = `<button onclick="changePage('${type}',${page-1})" ${page===1?'disabled':''}>上一页</button>
                <span>${page}/${total}</span>
                <button onclick="changePage('${type}',${page+1})" ${page===total?'disabled':''}>下一页</button>`;
            } else pagContainer.innerHTML = '';
        }

        function changePage(type, page) {
            if (type === 'official') offPage = page; else comPage = page;
            renderList(type);
        }

        // === 上传与 PR 逻辑 ===
        async function verifyToken() {
            const token = document.getElementById('token').value.trim();
            if (!token) return;
            try {
                const res = await fetch('https://api.github.com/user', { headers: { 'Authorization': `token ${token}` } });
                if (!res.ok) throw new Error();
                const data = await res.json();
                document.getElementById('creator').value = data.login;
                showStatus('✅ 身份验证成功', 'success');
            } catch (e) { showStatus('❌ Token 无效', 'error'); }
        }

        async function checkId() {
            const id = document.getElementById('extId').value.trim();
            if (existingIds.includes(id)) showStatus('⚠️ ID 已存在', 'error');
        }

        async function submitPR() {
            const token = document.getElementById('token').value.trim();
            const creator = document.getElementById('creator').value.trim();
            const id = document.getElementById('extId').value.trim();
            const name = document.getElementById('extName').value.trim();
            const desc = document.getElementById('extDesc').value.trim();
            const image = document.getElementById('extImage').value.trim();
            const fileUrl = document.getElementById('extFile').value.trim();
            const doc1 = document.getElementById('extDoc1').value.trim();
            const doc2 = document.getElementById('extDoc2').value.trim();
            const example = document.getElementById('extExample').value.trim();
            const tags = document.getElementById('extTags').value.split(',').map(t=>t.trim()).filter(t=>t);

            if (!token || !creator || !id || !name || !desc || !image || !fileUrl || !tags.length) {
                showStatus('❌ 请填写必填项', 'error'); return;
            }
            if (existingIds.includes(id)) { showStatus('❌ ID 冲突', 'error'); return; }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerText = '处理中...';

            try {
                // 1. 获取文件 SHA
                const fileRes = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/其他用户上传.json?ref=${BASE_BRANCH}`, { headers: { 'Authorization': `token ${token}` } });
                const fileData = await fileRes.json();
                const sha = fileData.sha;
                const content = JSON.parse(atob(fileData.content));

                // 2. 创建新分支
                const branchName = `submit-${id}-${Date.now()}`;
                const headRes = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/git/refs/heads/${BASE_BRANCH}`, { headers: { 'Authorization': `token ${token}` } });
                const headData = await headRes.json();
                await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/git/refs`, {
                    method: 'POST',
                    headers: { 'Authorization': `token ${token}` },
                    body: JSON.stringify({ ref: `refs/heads/${branchName}`, sha: headData.object.sha })
                });

                // 3. 更新文件
                const newData = [...content, {
                    id, image, name, desc,
                    authors: [{name: creator, url: `https://github.com/${creator}`}],
                    tags, fileUrl, docUrl: doc1, docUrl2: doc2, exampleUrl: example,
                    uploadTime: new Date().toISOString().split('T')[0],
                    source: 'community', submitter: creator
                }];
                await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/其他用户上传.json`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}` },
                    body: JSON.stringify({
                        message: `用户${creator}以 ID${id} 提交名为${name}扩展`,
                        content: btoa(JSON.stringify(newData, null, 2)),
                        sha, branch: branchName
                    })
                });

                // 4. 创建 PR
                await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/pulls`, {
                    method: 'POST',
                    headers: { 'Authorization': `token ${token}` },
                    body: JSON.stringify({
                        title: `提交扩展：${name} (ID: ${id})`,
                        body: `用户 ${creator} 提交了新扩展。\n\n- 名称：${name}\n- ID: ${id}\n- 描述：${desc}`,
                        head: branchName,
                        base: BASE_BRANCH
                    })
                });

                showStatus('✅ PR 创建成功！请等待合并', 'success');
                existingIds.push(id);
            } catch (e) {
                console.error(e);
                showStatus('❌ 提交失败 (检查权限/Token)', 'error');
            } finally {
                btn.disabled = false; btn.innerText = '创建 Pull Request';
            }
        }

        function showStatus(msg, type) {
            const el = document.getElementById('uploadStatus');
            el.className = `status ${type}`; el.innerText = msg; el.classList.remove('hidden');
        }

        init();
    </script>
</body>
</html>
